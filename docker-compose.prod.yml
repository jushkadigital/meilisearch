x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: meilisearch
    expose:
      - "7700"
    env_file:
      - .env
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped
    networks:
      - meili-network
      - proxiable
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M
    logging: *logging
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3g
          pids: 100
        reservations:
          cpus: '1'
          memory: 1.5g

  worker:
    build:
      context: ./my-app
      dockerfile: Dockerfile
    container_name: bun_worker
    depends_on:
      meilisearch:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - meili-network
      - red-compartida
      - proxiable
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50M
      - /home/bun/.cache:size=50M
    logging: *logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768m
          pids: 50
        reservations:
          cpus: '0.25'
          memory: 256m

volumes:
  meili_data:

networks:
  proxiable:
    external: true
    name: proxiable
  meili-network:
    driver: bridge
  red-compartida:
    external: true
    name: red-compartida


